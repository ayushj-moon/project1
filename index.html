<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard Panel Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<style>
    #nav-menu li a {
        color: #f0f8ff;
    }

    #nav-menu li:hover {
        background-color: rgba(32, 32, 242, 0.767);
        font-weight: 700;
        border-radius: 10px;
    }
    body{
        overflow: hidden;
    }
</style>

<body>

    <div class="container-fluid">

        <div class="row" style="height: 100vh;">


            <div class="col-3 bg-dark col-sm-3 col-xl-2 sticky-top">
                <div class="container mb-2">
                    <nav class="navbar bg-dark border-bottom  border-white" data-bs-theme="dark">
                        <div class="container-fluid">

                            <a class="nav-link m-2 text-white fs-4 fw-bolder" href="#">
                                <i class="bi bi-amazon"></i>
                                <span class="d-none d-sm-inline ms-2">Dashboard</span>
                            </a>
                        </div>
                    </nav>
                    <br>
                    <ul class="nav flex-column fs-5 " id="nav-menu">
                        <li class="nav-item" style="white-space: nowrap;">
                            <a class="nav-link m-2" href="#">
                                <i class="bi bi-house-door-fill"></i>
                                <span class="d-none d-sm-inline ms-2">Home</span>
                            </a>
                        </li>
                        <li class="nav-item" style="white-space: nowrap;">
                            <a class="nav-link m-2" href="#">
                                <i class="bi bi-columns-gap"></i>
                                <span class="d-none d-sm-inline ms-2">Products</span>
                            </a>
                        </li>
                        <li class="nav-item" style="white-space: nowrap;">
                            <a class="nav-link m-2" href="#">
                                <i class="bi bi-list-ul"></i>
                                <span class="d-none d-sm-inline ms-2">Order</span>
                            </a>
                        </li>
                        <li class="nav-item" style="white-space: nowrap;">
                            <a class="nav-link m-2" href="#">
                                <i class="bi bi-person-rolodex"></i>
                                <span class="d-none d-sm-inline ms-2">Contact</span>
                            </a>
                        </li>

                    </ul>

                </div>
            </div>

            <div class="col-10 col-sm-9 col-xl-10 p-0 m-0">
                <nav class="navbar navbar-expand-lg bg-body-tertiary">
                    <div class="container-fluid">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">
                                <a class="nav-link" href="#"><i class="bi bi-arrow-bar-right me-2"></i>Logout</a>
                            </li>
                        </ul>
                    </div>
                </nav>

                <div class="row d-flex justify-content-around mt-5">
                    <div class="col-4 rounded fw-bolder p-2" style="box-shadow: 0px 4px 4px 4px lightgrey;"><span class="d-block" style="font-size: 2rem;color: lightslategrey; ">Order :</span>
                        <p class="" style="font-size: 3rem; text-align: center; ">2000<span style="color: lightslategray;font-size: medium;">pts</span></p>
                        
                    </div>
                    <div class="col-4 rounded fw-bolder p-2" style="box-shadow: 0px 4px 4px 4px lightgrey;"><span class="d-block" style="font-size: 2rem;color: lightslategrey; ">Service :</span>
                        <p class="" style="font-size: 3rem; text-align: center; ">1000<span style="color: lightslategray;font-size: medium;">pts</span></p>
                    </div>
                </div>
            </div>

            
        </div>

    </div>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"

</html>
